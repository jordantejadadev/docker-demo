name: Java CI

on:
    push:
        branches:
            - main

jobs:
    backend-build:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_DB: docker_demo
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: 123456
                ports:
                    - 5432:5432
                options: >-
                    -health-cmd="pg_isready -U postgres -d docker_demo"
                    -health-interval=10s
                    -health-timeout=5s
                    -health-retries=5

        defaults:
            run:
                working-directory: backend

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Java 17
              uses: actions/setup-java@v4
              with:
                    distribution: temurin
                    java-version: 17

            - name: Make mvnw executable
              run: chmod +x mvnw

            - name: Build with Maven
              env:
                SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/docker_demo
                SPRING_DATASOURCE_USERNAME: postgres
                SPRING_DATASOURCE_PASSWORD: 123456
              run: ./mvnw clean verify

            - name: Build Backend Docker Image
              run: docker build -t docker-demo-backend .
              working-directory: backend

            - name: Build Frontend Docker Image
              run: docker build -t docker-demo-frontend .
              working-directory: frontend
              


                